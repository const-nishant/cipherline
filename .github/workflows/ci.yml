name: CipherLine CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (common)
        run: cargo clippy -p cipherline-common -- -D warnings

      - name: Clippy (relay)
        run: cargo clippy -p cipherline-relay -- -D warnings

  # ---------------------------------------------------------------------------
  # Test — common + relay (no Tauri deps)
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run common tests
        run: cargo test -p cipherline-common --all-targets

      - name: Run relay tests
        run: cargo test -p cipherline-relay --all-targets

  # ---------------------------------------------------------------------------
  # Client tests (store, commands)
  # ---------------------------------------------------------------------------
  test-client:
    name: Test client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install openssl --no-progress -y
          $sslDir = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" }
                    elseif (Test-Path "C:\Program Files\OpenSSL") { "C:\Program Files\OpenSSL" }
                    else { throw "OpenSSL not found" }
          echo "OPENSSL_DIR=$sslDir" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$sslDir\include" >> $env:GITHUB_ENV
          if (Test-Path "$sslDir\lib\VC\x64\MD") {
            echo "OPENSSL_LIB_DIR=$sslDir\lib\VC\x64\MD" >> $env:GITHUB_ENV
          } elseif (Test-Path "$sslDir\lib") {
            echo "OPENSSL_LIB_DIR=$sslDir\lib" >> $env:GITHUB_ENV
          }

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=$OPENSSL_PREFIX/lib" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_PREFIX/include" >> "$GITHUB_ENV"

      - name: Run client tests
        run: cargo test -p cipherline-client --all-targets

  # ---------------------------------------------------------------------------
  # Proptest fuzzing (extended)
  # ---------------------------------------------------------------------------
  fuzz:
    name: Proptest fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run proptest fuzz suite
        run: cargo test -p cipherline-common --test proptest_fuzz -- --nocapture
        env:
          PROPTEST_CASES: "500"

  # ---------------------------------------------------------------------------
  # Security audit (cargo-audit)
  # ---------------------------------------------------------------------------
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit
