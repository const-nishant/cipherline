name: CipherLine Release

# Triggered by pushing a version tag (v1.0.0, v0.2.3, etc.)
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: extract version, run tests
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $TAG"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run common + relay tests
        run: cargo test -p cipherline-common -p cipherline-relay --all-targets

      - name: Run proptest fuzz
        run: cargo test -p cipherline-common --test proptest_fuzz
        env:
          PROPTEST_CASES: "200"

  # ---------------------------------------------------------------------------
  # Desktop builds (Windows, macOS, Linux) via Tauri
  # ---------------------------------------------------------------------------
  build-desktop:
    name: Desktop — ${{ matrix.config.name }}
    needs: preflight
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Windows x64",
              os: windows-latest,
              target: x86_64-pc-windows-msvc,
            }
          - { name: "macOS x64", os: macos-latest, target: x86_64-apple-darwin }
          - {
              name: "macOS ARM64",
              os: macos-latest,
              target: aarch64-apple-darwin,
            }
          - {
              name: "Linux x64",
              os: ubuntu-latest,
              target: x86_64-unknown-linux-gnu,
            }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # --- System deps ---
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install openssl --no-progress -y
          # Find where choco installed OpenSSL
          $sslDir = if (Test-Path "C:\Program Files\OpenSSL-Win64") { "C:\Program Files\OpenSSL-Win64" }
                    elseif (Test-Path "C:\Program Files\OpenSSL") { "C:\Program Files\OpenSSL" }
                    else { throw "OpenSSL not found" }
          echo "OPENSSL_DIR=$sslDir" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$sslDir\include" >> $env:GITHUB_ENV
          # Find the lib directory (varies by installer)
          if (Test-Path "$sslDir\lib\VC\x64\MD") {
            echo "OPENSSL_LIB_DIR=$sslDir\lib\VC\x64\MD" >> $env:GITHUB_ENV
          } elseif (Test-Path "$sslDir\lib") {
            echo "OPENSSL_LIB_DIR=$sslDir\lib" >> $env:GITHUB_ENV
          }
          echo "OpenSSL found at: $sslDir"

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          echo "OPENSSL_DIR=$OPENSSL_PREFIX" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=$OPENSSL_PREFIX/lib" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_PREFIX/include" >> "$GITHUB_ENV"
          echo "OpenSSL found at: $OPENSSL_PREFIX"

      # --- Build frontend ---
      - name: Install npm deps
        run: npm ci
        working-directory: ui

      # --- Build Tauri ---
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.config.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # --- Upload artifacts ---
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cipherline-windows-x64
          path: |
            src-tauri/target/${{ matrix.config.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.config.target }}/release/bundle/nsis/*.exe
          retention-days: 5

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: cipherline-macos-${{ contains(matrix.config.target, 'aarch64') && 'arm64' || 'x64' }}
          path: |
            src-tauri/target/${{ matrix.config.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.config.target }}/release/bundle/macos/*.app
          retention-days: 5

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: cipherline-linux-x64
          path: |
            src-tauri/target/${{ matrix.config.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.config.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.config.target }}/release/bundle/appimage/*.AppImage
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Relay server binary (for self-hosting)
  # ---------------------------------------------------------------------------
  build-relay:
    name: Relay — ${{ matrix.config.name }}
    needs: preflight
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Linux x64",
              os: ubuntu-latest,
              target: x86_64-unknown-linux-gnu,
            }
          - {
              name: "Linux ARM64",
              os: ubuntu-latest,
              target: aarch64-unknown-linux-gnu,
            }
          - { name: "macOS x64", os: macos-latest, target: x86_64-apple-darwin }
          - {
              name: "macOS ARM64",
              os: macos-latest,
              target: aarch64-apple-darwin,
            }
          - {
              name: "Windows x64",
              os: windows-latest,
              target: x86_64-pc-windows-msvc,
            }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cross-compilation tools (ARM64)
        if: contains(matrix.config.target, 'aarch64') && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build relay
        run: cargo build -p cipherline-relay --release --target ${{ matrix.config.target }}

      - name: Package relay binary
        shell: bash
        run: |
          BIN="cipherline-relay"
          TARGET="${{ matrix.config.target }}"
          if [[ "$TARGET" == *"windows"* ]]; then BIN="${BIN}.exe"; fi
          mkdir -p dist
          cp "target/${TARGET}/release/${BIN}" "dist/${BIN}"

      - name: Upload relay artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.config.target }}
          path: dist/
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Android build
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: "34.0.0"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install npm deps
        run: npm ci
        working-directory: ui

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build OpenSSL for Android targets
        run: |
          sudo apt-get update
          sudo apt-get install -y make perl
          git clone --depth 1 --branch openssl-3.3.0 https://github.com/openssl/openssl.git /tmp/openssl-src

          NDK="${ANDROID_NDK_HOME:-/usr/local/lib/android/sdk/ndk/$(ls /usr/local/lib/android/sdk/ndk/ | head -1)}"
          export ANDROID_NDK_ROOT="$NDK"
          export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          build_openssl() {
            local ARCH=$1 TARGET=$2 API=$3 PREFIX=$4
            cd /tmp/openssl-src
            make clean 2>/dev/null || true
            ./Configure "$TARGET" -D__ANDROID_API__=$API --prefix="$PREFIX" no-shared no-tests
            make -j$(nproc)
            make install_sw
          }

          build_openssl aarch64 android-arm64 24 /tmp/openssl-android-arm64
          build_openssl armv7  android-arm   24 /tmp/openssl-android-arm
          build_openssl x86_64 android-x86_64 24 /tmp/openssl-android-x86_64
          build_openssl i686   android-x86    24 /tmp/openssl-android-x86

      - name: Build Android APK
        run: cargo tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # OpenSSL for each Android target
          OPENSSL_DIR: /tmp/openssl-android-arm64
          OPENSSL_LIB_DIR: /tmp/openssl-android-arm64/lib
          OPENSSL_INCLUDE_DIR: /tmp/openssl-android-arm64/include
          OPENSSL_STATIC: "1"
          AARCH64_LINUX_ANDROID_OPENSSL_DIR: /tmp/openssl-android-arm64
          ARMV7_LINUX_ANDROIDEABI_OPENSSL_DIR: /tmp/openssl-android-arm
          X86_64_LINUX_ANDROID_OPENSSL_DIR: /tmp/openssl-android-x86_64
          I686_LINUX_ANDROID_OPENSSL_DIR: /tmp/openssl-android-x86

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cipherline-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Docker image for relay
  # ---------------------------------------------------------------------------
  build-docker:
    name: Relay Docker image
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cipherline-relay:${{ needs.preflight.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/cipherline-relay:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub release
    needs: [preflight, build-desktop, build-relay, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | head -50

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CipherLine v${{ needs.preflight.outputs.version }}
          body: |
            ## CipherLine v${{ needs.preflight.outputs.version }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 | `.msi` / `.exe` installer |
            | macOS x64 | `.dmg` |
            | macOS ARM64 (Apple Silicon) | `.dmg` |
            | Linux x64 | `.deb` / `.rpm` / `.AppImage` |
            | Android | `.apk` |
            | Relay server | Standalone binaries for all platforms |
            | Relay Docker | `ghcr.io/${{ github.repository_owner }}/cipherline-relay:${{ needs.preflight.outputs.version }}` |

            ### Changes
            ${{ steps.changelog.outputs.changelog }}
          prerelease: ${{ needs.preflight.outputs.prerelease == 'true' }}
          draft: false
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
